function ContactPage() {
  const [form, setForm] = useState({ name: '', email: '', message: '' });
  const [errors, setErrors] = useState({});
  const [status, setStatus] = useState('idle');

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Required';
    if (!form.email.trim() || !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Valid email required';
    if (!form.message.trim() || form.message.length < 10) e.message = 'Please write at least 10 characters';
    return e;
  };

  const submit = (ev) => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setStatus('sending');
    setTimeout(() => setStatus('sent'), 1400);
  };

  const inputStyle = (field) => ({
    width: '100%', padding: '11px 14px', borderRadius: 8,
    background: 'var(--bg3)', border: `1px solid ${errors[field] ? 'rgba(248,113,113,0.6)' : 'var(--border)'}`,
    color: 'var(--text)', fontSize: 14, outline: 'none',
    fontFamily: "'DM Sans', sans-serif",
    transition: 'border-color 0.15s',
  });

  return (
    <div data-screen-label="07 Contact" style={{ paddingTop: 60 }}>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '72px 28px 80px' }}>
        <SectionLabel>Get In Touch</SectionLabel>

          {/* Left */}

            <p style={{ fontSize: 15, lineHeight: 1.75, color: 'var(--text-muted)', marginBottom: 36 }}>
              I'm currently open to new full-time roles in AI engineering, ML, and data. Whether it's a position or a collaboration — I'd love to hear from you.
            </p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              {[
                { label: 'Email', val: 'ivats2911@gmail.com', href: 'mailto:ivats2911@gmail.com' },
                { label: 'GitHub', val: 'github.com/ivats2911', href: 'https://github.com/ivats2911' },
                { label: 'LinkedIn', val: 'linkedin.com/in/sahil-s29', href: 'https://www.linkedin.com/in/sahil-s29/' },
                { label: 'Based', val: 'Gurugram, India', href: null },
              ].map(({ label, val, href }) => (
                <div key={label}>
                  <div style={{ fontSize: 10, fontFamily: "'DM Mono', monospace", color: 'var(--text-dim)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 4 }}>{label}</div>
                  {href ? (
                    <a href={href} target={href.startsWith('mailto') ? undefined : '_blank'} rel="noopener noreferrer" style={{ fontSize: 14, color: 'var(--accent)', transition: 'opacity 0.15s' }}
                      onMouseOver={e => e.currentTarget.style.opacity = '0.75'}
                      onMouseOut={e => e.currentTarget.style.opacity = '1'}>
                      {val}
                    </a>
                  ) : (
                    <span style={{ fontSize: 14, color: 'var(--text-muted)' }}>{val}</span>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Form */}
          <div>
            {status === 'sent' ? (
              <div style={{ padding: '40px', borderRadius: 14, background: 'rgba(74,222,128,0.05)', border: '1px solid rgba(74,222,128,0.25)', textAlign: 'center' }}>
                <div style={{ width: 48, height: 48, borderRadius: '50%', background: 'rgba(74,222,128,0.12)', border: '1px solid rgba(74,222,128,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 22, color: 'var(--green)' }}>✓</div>

                ].map(f => (
                  <div key={f.id}>
                    <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: 'var(--text-muted)', marginBottom: 6 }}>{f.label}</label>
                    <input
                      type={f.type} placeholder={f.ph} value={form[f.id]}
                      onChange={e => setForm(v => ({ ...v, [f.id]: e.target.value }))}
                      style={inputStyle(f.id)}
                      onFocus={e => { if (!errors[f.id]) e.target.style.borderColor = 'var(--purple)'; }}
                      onBlur={e => { if (!errors[f.id]) e.target.style.borderColor = 'var(--border)'; }}
                    />
                    {errors[f.id] && <p style={{ fontSize: 11, color: '#f87171', marginTop: 4 }}>{errors[f.id]}</p>}
                  </div>
                ))}
                <div>
                  <label style={{ display: 'block', fontSize: 12, fontWeight: 500, color: 'var(--text-muted)', marginBottom: 6 }}>Message</label>
                  <textarea
                    placeholder="Tell me about the role or project..."
                    value={form.message} rows={5}
                    onChange={e => setForm(v => ({ ...v, message: e.target.value }))}
                    style={{ ...inputStyle('message'), resize: 'vertical' }}
                    onFocus={e => { if (!errors.message) e.target.style.borderColor = 'var(--purple)'; }}
                    onBlur={e => { if (!errors.message) e.target.style.borderColor = 'var(--border)'; }}
                  />
                  {errors.message && <p style={{ fontSize: 11, color: '#f87171', marginTop: 4 }}>{errors.message}</p>}
                </div>
                <button type="submit" style={{
                  padding: '12px', borderRadius: 8, width: '100%',
                  background: status === 'sending' ? 'var(--purple-mid)' : 'var(--purple)',
                  border: 'none', color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer',
                  transition: 'opacity 0.15s, transform 0.15s',
                  opacity: status === 'sending' ? 0.75 : 1,
                }}
                onMouseOver={e => { if (status !== 'sending') { e.currentTarget.style.opacity = '0.88'; e.currentTarget.style.transform = 'translateY(-1px)'; } }}
                onMouseOut={e => { e.currentTarget.style.opacity = '1'; e.currentTarget.style.transform = 'none'; }}>
                  {status === 'sending' ? 'Sending…' : 'Send Message'}
                </button>
              </form>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

        <div>
          <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>Sahil Sharma</span>
          <span style={{ fontSize: 13, color: 'var(--text-dim)', marginLeft: 8 }}>· Data & AI Engineer · Gurugram, India</span>
        </div>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          <a href="https://github.com/ivats2911" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)', fontSize: 12, transition: 'color 0.15s', display: 'flex', alignItems: 'center', gap: 5 }}
            onMouseOver={e => e.currentTarget.style.color = 'var(--accent)'}
            onMouseOut={e => e.currentTarget.style.color = 'var(--text-dim)'}>
            <GithubIcon size={13} /> GitHub
          </a>
          <a href="https://www.linkedin.com/in/sahil-s29/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--text-dim)', fontSize: 12, transition: 'color 0.15s', display: 'flex', alignItems: 'center', gap: 5 }}
            onMouseOver={e => e.currentTarget.style.color = 'var(--accent)'}
            onMouseOut={e => e.currentTarget.style.color = 'var(--text-dim)'}>
            <LinkedInIcon size={13} /> LinkedIn
          </a>
          <span style={{ fontSize: 12, color: 'var(--text-dim)' }}>© 2026</span>

}

// ─── APP ─────────────────────────────────────────────────────────────────────

const PAGES = { Home: HomePage, About: AboutPage, Skills: SkillsPage, Experience: ExperiencePage, Projects: ProjectsPage, Education: EducationPage, Contact: ContactPage };

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#6666cc",
  "bgDark": "#09090b",
  "showAvailabilityBadge": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState(() => localStorage.getItem('ss_page') || 'Home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const go = (p) => {
    setPage(p);
    localStorage.setItem('ss_page', p);
    window.scrollTo(0, 0);
  };

  useEffect(() => {
    if (!tweaks) return;
    document.documentElement.style.setProperty('--purple', tweaks.accentColor);
    document.documentElement.style.setProperty('--bg', tweaks.bgDark);
  }, [tweaks && tweaks.accentColor, tweaks && tweaks.bgDark]);

  const Page = PAGES[page] || HomePage;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      <Nav current={page} go={go} />
      <main style={{ flex: 1 }}>
        <Page go={go} />
      </main>
      <Footer go={go} />

      <TweaksPanel>
        <TweakSection label="Colors">
          <TweakColor label="Accent / Purple" value={tweaks ? tweaks.accentColor : '#7c3aed'} onChange={v => setTweak('accentColor', v)} />
          <TweakColor label="Background" value={tweaks ? tweaks.bgDark : '#0a0a0f'} onChange={v => setTweak('bgDark', v)} />
        </TweakSection>
        <TweakSection label="Content">
          <TweakToggle label="Show availability badge" value={tweaks ? tweaks.showAvailabilityBadge : true} onChange={v => setTweak('showAvailabilityBadge', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
